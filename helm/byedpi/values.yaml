# Default values for byedpi.

replicaCount: 1

image:
  # Custom image to be built later. Override repository/tag at deploy time.
  repository: reshkin/byedpi
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# byedpi (ciadpi) command-line arguments controlling the DPI-bypass strategy.
# The container ENTRYPOINT is /opt/byedpi/ciadpi; these become its args.
# Examples:
#   ["--disorder", "1", "--debug", "1"]
#   ["--fake", "-1", "--md5sig", "--debug", "1"]
#   ["--oob", "1+s", "--debug", "1"]
#   ["--disorder", "1", "--fake", "-1", "--ttl", "8", "--auto=torst", "--tlsrec", "1+s", "--debug", "1"]
args:
  - "--tlsrec"
  - "1+s"
  - "--debug"
  - "1"

# The SOCKS5 port the proxy listens on.
proxyPort: 1080

# Internal (in-cluster) SOCKS5 service.
service:
  type: ClusterIP
  port: 1080
  annotations: {}

# Separate NodePort service for reaching the proxy from outside the cluster.
# Created in addition to the ClusterIP service above when enabled.
nodePortService:
  enabled: true
  port: 1080
  # Fixed nodePort exposed on each node. Must be within the cluster's
  # node-port range (default 30000-32767). Leave "" to auto-assign.
  nodePort: 31080
  annotations: {}

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

livenessProbe:
  tcpSocket:
    port: socks5
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  tcpSocket:
    port: socks5
  initialDelaySeconds: 3
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
